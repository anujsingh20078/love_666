<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4c2c2; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden; 
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin: 10px 0;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            height: 20px; 
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        button {
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease; 
            background-color: white;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #ffe6e6;
        }

        #no-btn {
            position: relative; 
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="teddy-img" src="1st.gif" alt="Teddy Bear">
        <h1 id="main-text">Do you love me? 🥺</h1>
        <p id="sub-text">nun is all yours...</p>
        
        <div class="btn-group">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById("no-btn");
        const yesBtn = document.getElementById("yes-btn");
        const mainText = document.getElementById("main-text");
        const subText = document.getElementById("sub-text");
        const teddyImg = document.getElementById("teddy-img");

        // Verified working Tenor CDN links
        const noGifs = [
            "2nd.webp", // 2nd State: Sad/Crying
            "3rd.webp",        // 3rd State: Rolling and crying
            "4th.gif"    // 4th State: Begging/Loud Crying
        ];

        const messages = [
            "Please think again! 🥺",
            "Ek aur baar Soch lo! 🥺",
            "beautiful pls Man jao na! Kitna code likh waogi 😭"
        ];
        
        const subTexts = [
            "so jao na matt aao...",
            "ek aur baar soch lo Please jan...",
            "bhot git load hai yrr is..."
        ];

        let noClickCount = 0;

        function updateNoState() {
            if (noClickCount < noGifs.length) {
                teddyImg.src = noGifs[noClickCount];
                mainText.innerText = messages[noClickCount];
                subText.innerText = subTexts[noClickCount];
                noClickCount++;
            }
        }

        function runawayNoButton() {
            if (noClickCount >= noGifs.length) {
                noBtn.style.position = "absolute";
                const safeMargin = 50;
                const maxX = window.innerWidth - noBtn.offsetWidth - safeMargin;
                const maxY = window.innerHeight - noBtn.offsetHeight - safeMargin;
                
                const randomX = Math.max(safeMargin, Math.floor(Math.random() * maxX));
                const randomY = Math.max(safeMargin, Math.floor(Math.random() * maxY));
                
                noBtn.style.left = `${randomX}px`;
                noBtn.style.top = `${randomY}px`;
            }
        }

        noBtn.addEventListener("click", () => {
            if (noClickCount < noGifs.length) {
                updateNoState();
            } else {
                runawayNoButton();
            }
        });

        noBtn.addEventListener("mouseover", runawayNoButton);

        yesBtn.addEventListener("click", () => {
            mainText.innerText = "I knew it! You Love me a lot 😘";
            subText.innerText = "";
            // Final Happy State Kissing
            teddyImg.src = "https://media1.tenor.com/m/gUiu1zyxfzYAAAAC/bear-kiss-bear-kisses.gif"; 
            noBtn.style.display = "none";
        });
    </script>

</body>
</html>
